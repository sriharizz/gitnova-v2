name: GitNova Daily Pipeline

on:
  schedule:
    # Run daily at 06:00 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual triggers from the GitHub UI for demos

jobs:
  run-pipeline:
    name: Run GitNova Issue Processing Engine
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run Pipeline Engine
        run: |
          cd backend
          python -m app.main
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_GITHUB_TOKEN }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Send Slack/Discord Alert on Failure
        if: failure()
        run: |
          # Safe fallback if webhook is not configured
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
                 -d '{"content": "🚨 **GitNova Pipeline Run Failed!**\nView logs here: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
                 ${{ secrets.DISCORD_WEBHOOK_URL }}
          else
            echo "⚠️ Job failed but no DISCORD_WEBHOOK_URL secret was configured."
          fi
